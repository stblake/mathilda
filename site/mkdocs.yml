site_name: Mathilda
site_description: A tiny, AI-agent-generated symbolic computer algebra system written in C99.
site_url: https://stblake.github.io/mathilda/
repo_url: https://github.com/stblake/mathilda
repo_name: stblake/mathilda
edit_uri: edit/main/site/docs/
copyright: Mathilda is free software, licensed under GPLv3.

docs_dir: docs

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

extra_css:
  - assets/custom.css

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

# Top-level nav is generated by the awesome-pages plugin from the docs/ tree
# and the `.pages` files in each directory (see site/docs/.pages).

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stblake/mathilda
  generator: false
